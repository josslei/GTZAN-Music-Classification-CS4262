# Experiment: RNN with Attention 3-second segments
model_arch: "rnna"

# Data Configuration
metadata_path: "dataset/mel/metadata.csv"
mel_dir: "dataset/mel"
batch_size: 64
num_workers: 4
sample_rate: 22050
hop_length: 512
segment_seconds: 3.0

# Model Configuration
model:
  num_classes: 10

# Overrides for training configuration
training:
  experiment_name: "rnna_3s"
  max_epochs: 300
  lr: 0.0005
  weight_decay: 0.01
  mixup_alpha: 0.1
  patience: 30
  log_dir: "outputs/logs"
  checkpoint_dir: "outputs/checkpoints"
  accelerator: "auto"
  devices: "auto"

  optimizer_params:
    betas: [0.9, 0.999]
    eps: 1.0e-8

  scheduler_params:
    factor: 0.5
    patience: 15
    min_lr: 1.0e-6
