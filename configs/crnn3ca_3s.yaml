# Experiment: CRNN with Attention and 3-Channels
model_arch: "crnn3ca"

# Data Configuration
metadata_path: "dataset/mel/metadata.csv"
mel_dir: "dataset/mel"
batch_size: 64
num_workers: 4
sample_rate: 22050
hop_length: 512
segment_seconds: 3.0

# Model Configuration
model:
  num_classes: 10

# Overrides for training configuration
training:
  experiment_name: "crnn3ca_3s"
  max_epochs: 300
  lr: 0.001
  weight_decay: 0.01
  mixup_alpha: 0.2
  patience: 40
  log_dir: "outputs/logs"
  checkpoint_dir: "outputs/checkpoints"
  accelerator: "auto"
  devices: "auto"

  optimizer_params:
    betas: [0.9, 0.999]
    eps: 1.0e-8

  scheduler_params:
    factor: 0.5
    patience: 12
    min_lr: 1.0e-6
