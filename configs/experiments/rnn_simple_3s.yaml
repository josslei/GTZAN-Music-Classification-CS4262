# Experiment: Simple RNN 3-second segments
model_arch: "rnn_simple"
segment_seconds: 3.0

# Overrides for training configuration
training:
  experiment_name: "rnn_simple_3s"
  max_epochs: 200
  lr: 0.001
  weight_decay: 0.01
  mixup_alpha: 0.0 # Disable mixup for simple RNN baseline
  patience: 30

  optimizer_params:
    betas: [0.9, 0.999]
    eps: 1.0e-8

  scheduler_params:
    factor: 0.5
    patience: 10
    min_lr: 1.0e-6
