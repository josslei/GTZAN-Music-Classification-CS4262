# Experiment: CNN2D 3-second segments
model_arch: "cnn2d"
segment_seconds: 3.0

# Overrides for training configuration
training:
  experiment_name: "cnn2d_3s"
  max_epochs: 200
  lr: 0.001
  weight_decay: 0.01
  mixup_alpha: 0.2
  patience: 30

  # Optimizer specific parameters (passed to AdamW)
  optimizer_params:
    betas: [0.9, 0.999]
    eps: 1.0e-8

  # Scheduler specific parameters (passed to ReduceLROnPlateau)
  scheduler_params:
    factor: 0.5
    patience: 10
    min_lr: 1.0e-6
